apiVersion: v1
kind: deployment
metadata:
  name: agent-api
  environment: production

spec:
  replicas: 2
  
  container:
    name: agent-api
    # TODO: This should be updated by the CD pipeline
    image_tag: "83aee9cdfc2a0e5cbe7e9420858c0c0614881e99"
    port: 8080
    
    env:
      - name: PROMPT_VERSION
        value: "v1.0.0"
    
    resources:
      cpu: "500m"
      memory: "512Mi"
    
    healthcheck:
      path: /healthz
      interval: 10s
      timeout: 5s

